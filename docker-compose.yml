version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: money-planner-db
    environment:
      POSTGRES_USER: money_planner
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: money_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-planner-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: money-planner-backend
    environment:
      DATABASE_URL: postgres://money_planner:dev_password@postgres:5432/money_planner?sslmode=disable
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - money-planner-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: money-planner-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - money-planner-network
    restart: unless-stopped

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: money-planner-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - money-planner-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  money-planner-network:
    driver: bridge
