version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: money-planner-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-money_planner}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      # Init scripts run on first startup only
      - ./init-db.sh:/docker-entrypoint-initdb.d/00-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-money_planner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - money-planner-network
    # Don't restart on failure in prod - let orchestrator handle it
    restart: no

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: money-planner-api-prod
    environment:
      # Database configuration from environment
      DATABASE_URL: "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-money_planner}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: ${API_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - money-planner-network
    restart: unless-stopped
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    image: node:18-alpine
    container_name: money-planner-frontend-prod
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - money-planner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data_prod:
    driver: local

networks:
  money-planner-network:
    driver: bridge
