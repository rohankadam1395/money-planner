version: "2"
sql:
  - schema: "internal/db/migrations"
    queries: "internal/db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/db/generated"
        sql_package: "pgx"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
